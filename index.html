<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Live Cams • T2CSW 20% Revshare</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: scale(1.04); box-shadow: 0 0 25px rgba(236, 72, 153, 0.5); }
    .skeleton { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-black tracking-tighter text-pink-500">LIVE<span class="text-white">CAMS</span></h1>
        <div class="text-xs px-3 py-1 bg-green-500/10 text-green-400 rounded-full font-mono inline-block mt-1">20% LIFETIME REVSHARE • T2CSW</div>
      </div>
      <div class="flex items-center gap-8">
        <div class="text-center">
          <div id="total-models" class="text-3xl font-bold text-green-400">0</div>
          <div class="text-xs text-zinc-500">ONLINE</div>
        </div>
        <button onclick="loadCams()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium flex items-center gap-2">
          🔄 Refresh
        </button>
      </div>
    </div>

    <!-- Search + Sort -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="search" type="text" placeholder="🔍 Search username or title..." 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-pink-500 rounded-3xl px-6 py-4 text-lg outline-none"
             onkeyup="debounceSearch()">
      <select id="sort" onchange="applyFilters()" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg outline-none">
        <option value="viewers">Most Popular</option>
        <option value="name">A–Z</option>
      </select>
    </div>

    <!-- Gender -->
    <div id="gender-filters" class="flex flex-wrap gap-3 justify-center mb-8"></div>

    <!-- Tags -->
    <div id="tags" class="flex flex-wrap gap-2 justify-center mb-10"></div>

    <!-- Stats -->
    <div class="text-center text-xs text-zinc-500 mb-4" id="page-info"></div>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6"></div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center gap-3 mt-10"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-6xl w-full">
      <div class="flex justify-between items-center px-6 py-4 border-b border-zinc-700">
        <div id="modal-title" class="font-bold text-xl"></div>
        <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
      </div>
      <iframe id="embed" class="w-full aspect-video" allowfullscreen allow="camera; microphone"></iframe>
    </div>
  </div>

  <script>
    const WM = "T2CSW";
    const LIMIT = 500;
    const PAGE_SIZE = 48;
    let allRooms = [], currentPage = 1, currentGender = "", currentTag = "", searchTerm = "", sortMode = "viewers";
    let debounceTimer;

    async function fetchRooms() {
      const url = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&format=json&limit=${LIMIT}`;
      try {
        let res = await fetch(url);
        let data = await res.json();
        return data.results || [];
      } catch {
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        let res = await fetch(proxyUrl);
        let data = await res.json();
        return data.results || [];
      }
    }

    async function loadCams() {
      document.getElementById("grid").innerHTML = Array(8).fill(`
        <div class="bg-zinc-900 rounded-3xl overflow-hidden">
          <div class="skeleton h-48 bg-zinc-800"></div>
          <div class="p-4 space-y-3">
            <div class="skeleton h-5 bg-zinc-800 w-3/4"></div>
            <div class="skeleton h-4 bg-zinc-800 w-1/2"></div>
          </div>
        </div>`).join('');

      allRooms = await fetchRooms();
      updateStats();
      renderGenderFilters();
      renderTags();
      currentPage = 1;
      applyFilters();
    }

    function updateStats() {
      document.getElementById("total-models").textContent = allRooms.length;
    }

    function renderGenderFilters() {
      const container = document.getElementById("gender-filters");
      container.innerHTML = `
        <button onclick="setGender('')" class="gender-btn px-7 py-3 bg-pink-600 rounded-3xl text-sm font-semibold">ALL</button>
        <button onclick="setGender('f')" class="gender-btn px-7 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-semibold">♀ Female</button>
        <button onclick="setGender('m')" class="gender-btn px-7 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-semibold">♂ Male</button>
        <button onclick="setGender('c')" class="gender-btn px-7 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-semibold">👫 Couple</button>
        <button onclick="setGender('t')" class="gender-btn px-7 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-semibold">⚧ Trans</button>`;
    }

    function setGender(g) {
      currentGender = g;
      document.querySelectorAll('.gender-btn').forEach(b => {
        b.style.backgroundColor = b.textContent.trim() === 'ALL' && !g || 
          (b.textContent.includes('Female') && g==='f') || 
          (b.textContent.includes('Male') && g==='m') || 
          (b.textContent.includes('Couple') && g==='c') || 
          (b.textContent.includes('Trans') && g==='t') ? '#db2777' : '';
      });
      currentPage = 1;
      applyFilters();
    }

    function renderTags() {
      const container = document.getElementById("tags");
      container.innerHTML = `<button onclick="setTag('')" class="px-5 py-2 bg-zinc-800 hover:bg-pink-600 rounded-3xl text-xs font-medium">ALL TAGS</button>`;
      
      const counts = {};
      allRooms.forEach(r => (r.tags || []).forEach(t => counts[t] = (counts[t]||0)+1));
      
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,15).forEach(([tag]) => {
        const btn = document.createElement("button");
        btn.className = `px-5 py-2 rounded-3xl text-xs font-medium ${currentTag===tag ? 'bg-pink-600' : 'bg-zinc-800 hover:bg-zinc-700'}`;
        btn.textContent = tag;
        btn.onclick = () => setTag(tag);
        container.appendChild(btn);
      });
    }

    function setTag(tag) {
      currentTag = tag;
      renderTags();
      currentPage = 1;
      applyFilters();
    }

    function debounceSearch() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        searchTerm = document.getElementById("search").value.toLowerCase().trim();
        currentPage = 1;
        applyFilters();
      }, 300);
    }

    function applyFilters() {
      let filtered = allRooms.filter(room => {
        if (currentGender && room.gender !== currentGender) return false;
        if (currentTag && !(room.tags || []).includes(currentTag)) return false;
        if (searchTerm && !room.username.toLowerCase().includes(searchTerm) && 
            !(room.room_subject || "").toLowerCase().includes(searchTerm)) return false;
        return true;
      });

      if (sortMode === "viewers") {
        filtered.sort((a,b) => (b.num_users||0) - (a.num_users||0));
      } else {
        filtered.sort((a,b) => a.username.localeCompare(b.username));
      }

      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageRooms = filtered.slice(start, start + PAGE_SIZE);

      renderGrid(pageRooms);
      renderPagination(totalPages, filtered.length);
    }

    function renderGrid(rooms) {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      rooms.forEach(room => {
        const card = document.createElement("div");
        card.className = "card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800";
        card.innerHTML = `
          <a href="${room.chat_room_url_revshare}" target="_blank" class="block relative">
            <img src="${room.image_url_360x270 || room.image_url}" loading="lazy" class="w-full aspect-video object-cover">
            <div class="absolute top-3 right-3 bg-black/70 text-xs px-3 py-1 rounded-full font-mono">${room.num_users||0}</div>
          </a>
          <div class="p-4">
            <div class="font-bold text-xl">${room.username}</div>
            <div class="text-zinc-400 text-sm line-clamp-2">${room.room_subject || "No description"}</div>
            <div class="flex gap-3 mt-5">
              <a href="${room.chat_room_url_revshare}" target="_blank" class="flex-1 text-center py-3 bg-green-600 hover:bg-green-500 rounded-2xl font-semibold text-sm">💬 CHAT</a>
              <button onclick="openEmbed('${room.iframe_embed_revshare}', '${room.username}')" class="flex-1 text-center py-3 bg-pink-600 hover:bg-pink-500 rounded-2xl font-semibold text-sm">📺 WATCH LIVE</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function renderPagination(totalPages, totalResults) {
      const container = document.getElementById("pagination");
      let html = `<span class="text-xs text-zinc-500 px-4">${totalResults} cams • Page ${currentPage}/${totalPages}</span>`;
      
      if (totalPages > 1) {
        html += `<button onclick="changePage(-1)" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">← Prev</button>`;
        html += `<button onclick="changePage(1)" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Next →</button>`;
      }
      container.innerHTML = html;
    }

    function changePage(dir) {
      currentPage += dir;
      if (currentPage < 1) currentPage = 1;
      applyFilters();
    }

    function openEmbed(html, name) {
      document.getElementById("modal-title").innerHTML = `${name} <span class="text-green-400 text-sm font-normal">● LIVE</span>`;
      document.getElementById("embed").srcdoc = html;
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      modal.classList.add("hidden");
      document.getElementById("embed").srcdoc = "";
    }

    // INIT
    window.onload = () => {
      document.getElementById("sort").value = "viewers";
      loadCams();
      setInterval(loadCams, 90000);
    };
  </script>
</body>
</html>
